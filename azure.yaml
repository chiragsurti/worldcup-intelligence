name: worldcup-intelligence
metadata:
  template: worldcup-intelligence@1.0.0
services:
  mcp-server:
    project: ./mcp_server
    language: python
    host: containerapp
    docker:
      path: mcp_server/Dockerfile
      context: .
  agent:
    project: ./agent
    language: python
    host: containerapp
    docker:
      path: agent/Dockerfile
      context: .
  dashboard:
    project: ./dashboard
    language: python
    host: containerapp
    docker:
      path: dashboard/Dockerfile
      context: .
