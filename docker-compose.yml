services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worldcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FOOTBALL_API_KEY=${FOOTBALL_API_KEY:-}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/worldcup
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.create_connection((\"localhost\",8000),2); s.close()'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "8088:8088"
    environment:
      - FOUNDRY_PROJECT_ENDPOINT=${FOUNDRY_PROJECT_ENDPOINT:-}
      - AZURE_AI_MODEL_DEPLOYMENT_NAME=${AZURE_AI_MODEL_DEPLOYMENT_NAME:-gpt-4o}
      - AZURE_AI_KEY=${AZURE_AI_KEY:-}
      - FOUNDRY_TOOLBOX_ENDPOINT=${FOUNDRY_TOOLBOX_ENDPOINT:-}
      - MCP_SERVER_URL=http://mcp-server:8000/mcp
    depends_on:
      mcp-server:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/worldcup
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
